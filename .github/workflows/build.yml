name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build kanvas.jar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Compile
        run: ./compile.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kanvas-jar
          path: build/kanvas.jar
          retention-days: 1

  test-sketches:
    name: Test — ${{ matrix.sketch }}
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        sketch: [test-shapes, test-drawmodes, test-input, test-tui-basic, test-tui-input, test-tui-animation]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download kanvas.jar
        uses: actions/download-artifact@v4
        with:
          name: kanvas-jar
          path: build/

      - name: Build ${{ matrix.sketch }}
        working-directory: testing/${{ matrix.sketch }}
        run: java --enable-native-access=ALL-UNNAMED -jar ../../build/kanvas.jar build
